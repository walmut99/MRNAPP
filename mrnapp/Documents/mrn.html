<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MRN (مرن) — Prototype</title>
<!--
  MRN (مرن) HTML Prototype
  Based on MRN_Specification.docx — Sections 4, 5, 10
  Patient data: Sarah Al-Mutairi (Week 6 of 16, Premium plan)

  Structure:
    1. Design tokens (CSS custom properties)
    2. Reset + base styles
    3. Phone frame (desktop only) + app viewport
    4. Shared components (section label, divider, top bar, bottom nav, back bar)
    5. Screen styles (home, nutrition, lab, profile, billing, plans, progress, stubs)
    6. Markup — all screens rendered, hidden/shown via JS routing
    7. State + data + routing (single commented JS block at bottom)

  All tokens are named to map 1:1 to a future React Native theme file.
  Inline comments flag values invented for the prototype that are not in the spec.
-->
<style>
  /* =========================================================================
     1. DESIGN TOKENS
     Maps directly to Section 4 of MRN Specification
     ========================================================================= */
  :root {
    /* Colours — from Section 4 */
    --color-accent: #1D9E75;
    --color-accent-light: #E1F5EE;
    --color-accent-dark: #085041;
    --color-text-primary: #1A1A18;
    --color-text-secondary: #888780;
    --color-bg-primary: #FFFFFF;
    --color-bg-secondary: #F5F5F3;
    --color-border-tertiary: #E8E8E6;
    --color-danger: #A32D2D;
    --color-danger-light: #FCEBEB;
    --color-warn: #854F0B;
    --color-warn-light: #FAEEDA;
    --color-borderline: #185FA5;
    --color-borderline-light: #E6F1FB;

    /* Macro arc colours — from Section 5.1 (calories green, protein blue, fat amber, carbs pink) */
    --color-macro-calories: #1D9E75;
    --color-macro-protein: #185FA5;
    --color-macro-fat: #C57B1F;
    --color-macro-carbs: #C9447A;
    --color-macro-track: #EEEEEC;

    /* Typography — from Section 4 */
    --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    --font-size-hero: 32px;
    --font-size-body: 13px;
    --font-size-sublabel: 11px;
    --font-size-section-label: 10px;
    --weight-regular: 400;
    --weight-medium: 500;

    /* Spacing — 22px horizontal section padding per Section 4 */
    --space-section-x: 22px;
    --space-section-y: 20px;
    --space-divider: 0.5px;

    /* Phone frame dimensions — iPhone 14 proportions */
    --frame-width: 390px;
    --frame-height: 844px;
    --frame-radius: 44px;
  }

  /* =========================================================================
     2. RESET + BASE
     ========================================================================= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-system);
    font-size: var(--font-size-body);
    color: var(--color-text-primary);
    background: #CFCFCB; /* neutral grey surround — only visible in desktop phone-frame view */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    line-height: 1.4;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  svg { display: block; }

  /* =========================================================================
     3. PHONE FRAME + APP VIEWPORT
     Hybrid: phone frame ≥500px viewport, full-viewport below.
     App contents inside .app are identical in both modes — only the wrapper differs.
     ========================================================================= */
  .phone-frame {
    width: var(--frame-width);
    height: var(--frame-height);
    background: var(--color-bg-primary);
    border-radius: var(--frame-radius);
    overflow: hidden;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.35), 0 0 0 10px #1A1A18;
    position: relative;
  }
  .app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--color-bg-secondary);
    position: relative;
    overflow: hidden;
  }
  .app__content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 80px; /* leave space above bottom nav */
  }
  .app__content::-webkit-scrollbar { width: 0; }

  /* Mobile: drop phone frame entirely */
  @media (max-width: 500px) {
    body { background: var(--color-bg-secondary); }
    .phone-frame {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }
  }

  /* =========================================================================
     4. SHARED COMPONENTS
     ========================================================================= */

  /* Section label — 10px uppercase, Section 4 */
  .section-label {
    font-size: var(--font-size-section-label);
    font-weight: var(--weight-medium);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
  }
  .section-label--count { color: var(--color-text-secondary); font-weight: var(--weight-regular); }

  /* Section block — full-width, 22px horizontal padding, 0.5px divider between */
  .section {
    padding: var(--space-section-y) var(--space-section-x);
    background: var(--color-bg-primary);
    border-bottom: var(--space-divider) solid var(--color-border-tertiary);
  }
  .section--tight { padding-top: 14px; padding-bottom: 14px; }
  .section__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  /* Top bar — greeting / week chip / avatar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px var(--space-section-x);
    background: var(--color-bg-primary);
    border-bottom: var(--space-divider) solid var(--color-border-tertiary);
  }
  .top-bar__greeting {
    font-size: 15px;
    font-weight: var(--weight-medium);
  }
  .top-bar__greeting-sub {
    font-size: var(--font-size-sublabel);
    color: var(--color-text-secondary);
    margin-top: 2px;
  }
  .week-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--color-accent-light);
    color: var(--color-accent-dark);
    border-radius: 999px;
    font-size: var(--font-size-sublabel);
    font-weight: var(--weight-medium);
  }
  .week-chip__dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--color-accent);
  }

  /* Avatar */
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--color-accent);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: var(--weight-medium);
    flex-shrink: 0;
  }
  .avatar--lg { width: 64px; height: 64px; font-size: 22px; }
  .avatar--ai { background: var(--color-accent); }

  /* Simple back-bar for sub-pages */
  .back-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px var(--space-section-x);
    background: var(--color-bg-primary);
    border-bottom: var(--space-divider) solid var(--color-border-tertiary);
  }
  .back-bar__btn {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: var(--color-text-primary);
  }
  .back-bar__title {
    font-size: 15px;
    font-weight: var(--weight-medium);
  }

  /* Bottom navigation */
  .bottom-nav {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    background: var(--color-bg-primary);
    border-top: var(--space-divider) solid var(--color-border-tertiary);
    padding: 8px 12px 18px; /* extra bottom for home-indicator safe area */
  }
  .bottom-nav__item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    color: var(--color-text-secondary);
    font-size: 10px;
    font-weight: var(--weight-medium);
    letter-spacing: 0.02em;
  }
  .bottom-nav__icon {
    width: 54px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    transition: background 150ms ease;
  }
  .bottom-nav__item--active { color: var(--color-accent-dark); }
  .bottom-nav__item--active .bottom-nav__icon {
    background: var(--color-accent-light);
  }

  /* Sub-tab bar (used in Nutrition + Lab) */
  .subtab-bar {
    display: flex;
    gap: 4px;
    padding: 10px var(--space-section-x);
    background: var(--color-bg-primary);
    border-bottom: var(--space-divider) solid var(--color-border-tertiary);
  }
  .subtab-bar__item {
    flex: 1;
    text-align: center;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: var(--weight-medium);
    color: var(--color-text-secondary);
    border-radius: 8px;
  }
  .subtab-bar__item--active {
    background: var(--color-bg-secondary);
    color: var(--color-text-primary);
  }

  /* Status dot (used in 'all normal' marker list + trend dropdown) */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot--normal { background: var(--color-accent); }
  .status-dot--high { background: var(--color-danger); }
  .status-dot--low { background: var(--color-warn); }
  .status-dot--borderline { background: var(--color-borderline); }

  /* Generic progress bar */
  .progress-bar {
    height: 4px;
    background: var(--color-border-tertiary);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar__fill {
    height: 100%;
    background: var(--color-accent);
    border-radius: 999px;
    transition: width 300ms ease;
  }

  /* =========================================================================
     5. SCREEN-SPECIFIC STYLES
     ========================================================================= */

  /* ----- Home: body composition row ----- */
  .bodycomp-row {
    display: flex;
    align-items: stretch;
  }
  .bodycomp-stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 4px;
  }
  .bodycomp-stat + .bodycomp-stat {
    border-left: var(--space-divider) solid var(--color-border-tertiary);
    padding-left: 14px;
    margin-left: 14px;
  }
  .bodycomp-stat__label { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }
  .bodycomp-stat__value {
    font-size: var(--font-size-hero);
    font-weight: var(--weight-medium);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .bodycomp-stat__value-unit {
    font-size: 14px;
    font-weight: var(--weight-regular);
    color: var(--color-text-secondary);
    margin-left: 2px;
  }
  .bodycomp-stat__trend {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: var(--font-size-sublabel);
    color: var(--color-accent);
  }
  .bodycomp-stat__trend--neutral { color: var(--color-text-secondary); }

  /* ----- Home: macro arcs row ----- */
  .macro-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .macro-arc {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .macro-arc__svg {
    width: 58px;
    height: 58px;
    position: relative;
  }
  .macro-arc__label {
    font-size: var(--font-size-sublabel);
    color: var(--color-text-secondary);
  }
  .macro-arc__value {
    font-size: 12px;
    font-weight: var(--weight-medium);
  }

  /* Last-logged meal strip */
  .meal-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 14px;
    border-top: var(--space-divider) solid var(--color-border-tertiary);
  }
  .meal-strip__info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .meal-strip__name { font-size: 13px; font-weight: var(--weight-medium); }
  .meal-strip__meta { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }
  .meal-strip__link {
    font-size: 12px;
    color: var(--color-accent);
    font-weight: var(--weight-medium);
  }

  /* ----- Home: activity row (water + walker) ----- */
  .activity-row {
    display: flex;
    gap: 14px;
  }
  .activity-tile {
    flex: 1;
    background: var(--color-bg-secondary);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 148px;
  }
  .activity-tile__label { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }
  .activity-tile__main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .activity-tile__value { font-size: 18px; font-weight: var(--weight-medium); }
  .activity-tile__sub { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }

  /* Water quick-add buttons */
  .water-buttons {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .water-btn {
    flex: 1;
    padding: 6px;
    background: var(--color-bg-primary);
    border: var(--space-divider) solid var(--color-border-tertiary);
    border-radius: 8px;
    font-size: var(--font-size-sublabel);
    font-weight: var(--weight-medium);
    color: var(--color-accent-dark);
  }
  .water-btn:active { background: var(--color-accent-light); }

  /* Walking-figure gentle bob animation */
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  .walker-svg { animation: bob 1.4s ease-in-out infinite; }

  /* Steps progress bar */
  .steps-progress {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ----- Home: AI nutritionist card ----- */
  .ai-card {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .ai-card__body { flex: 1; }
  .ai-card__message {
    font-size: 13px;
    line-height: 1.5;
    color: var(--color-text-primary);
  }
  .ai-card__chips {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    background: var(--color-bg-secondary);
    border-radius: 999px;
    font-size: 12px;
    font-weight: var(--weight-medium);
    color: var(--color-text-primary);
  }
  .chip--accent {
    background: var(--color-accent-light);
    color: var(--color-accent-dark);
  }

  /* ----- Home: progress thumbnails ----- */
  .progress-thumbs {
    display: flex;
    gap: 10px;
  }
  .thumb {
    flex: 1;
    aspect-ratio: 3 / 4;
    background: linear-gradient(135deg, #E8E8E6 0%, #D5D5D2 100%);
    border-radius: 12px;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 10px;
  }
  .thumb__label {
    font-size: var(--font-size-sublabel);
    font-weight: var(--weight-medium);
    color: var(--color-text-primary);
    background: rgba(255,255,255,0.85);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .goal-progress {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .goal-progress__row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }
  .goal-progress__label { color: var(--color-text-secondary); }
  .goal-progress__value { font-weight: var(--weight-medium); }

  /* ----- Home: flagged markers alerts ----- */
  .flag-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .flag-row:last-child { margin-bottom: 0; }
  .flag-row--high { background: var(--color-danger-light); color: var(--color-danger); }
  .flag-row--low { background: var(--color-warn-light); color: var(--color-warn); }
  .flag-row--borderline { background: var(--color-borderline-light); color: var(--color-borderline); }
  .flag-row__left { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: var(--weight-medium); }
  .flag-row__value { font-size: 13px; font-weight: var(--weight-medium); }

  /* ----- Nutrition: Chat ----- */
  .chat-stream {
    padding: 16px var(--space-section-x);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.45;
  }
  .bubble-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .bubble-row--user { justify-content: flex-end; }
  .bubble--ai {
    background: var(--color-accent-light);
    color: var(--color-accent-dark);
    border-bottom-left-radius: 4px;
  }
  .bubble--user {
    background: var(--color-bg-primary);
    border: var(--space-divider) solid var(--color-border-tertiary);
    color: var(--color-text-primary);
    border-bottom-right-radius: 4px;
  }
  .bubble-row--user .avatar { display: none; }

  .chat-input-area {
    border-top: var(--space-divider) solid var(--color-border-tertiary);
    background: var(--color-bg-primary);
    padding: 10px var(--space-section-x) 14px;
  }
  .chip-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 10px;
    margin: 0 calc(-1 * var(--space-section-x)) 0;
    padding-left: var(--space-section-x);
    padding-right: var(--space-section-x);
  }
  .chip-scroll::-webkit-scrollbar { display: none; }
  .chip-scroll .chip { flex-shrink: 0; }

  .chat-input {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--color-bg-secondary);
    border-radius: 999px;
  }
  .chat-input__icon {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    flex-shrink: 0;
  }
  .chat-input__field {
    flex: 1;
    font-size: 13px;
    color: var(--color-text-secondary);
    padding: 4px 2px;
  }
  .chat-input__send {
    width: 32px;
    height: 32px;
    background: var(--color-accent);
    color: #fff;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ----- Nutrition: Today's log ----- */
  .consumed-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .consumed-row {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .consumed-row__label { font-size: 12px; color: var(--color-text-secondary); }
  .consumed-row__value { font-size: 12px; font-weight: var(--weight-medium); }
  .consumed-row .progress-bar__fill { background: var(--color-macro-calories); }
  .consumed-row--protein .progress-bar__fill { background: var(--color-macro-protein); }
  .consumed-row--fat .progress-bar__fill { background: var(--color-macro-fat); }
  .consumed-row--carbs .progress-bar__fill { background: var(--color-macro-carbs); }

  .meal-slot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: var(--space-divider) solid var(--color-border-tertiary);
  }
  .meal-slot:last-child { border-bottom: none; }
  .meal-slot__info { display: flex; flex-direction: column; gap: 3px; }
  .meal-slot__name { font-size: 13px; font-weight: var(--weight-medium); }
  .meal-slot__macros { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }
  .meal-slot__right { display: flex; align-items: center; gap: 8px; }
  .source-badge {
    font-size: 10px;
    font-weight: var(--weight-medium);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--color-accent-light);
    color: var(--color-accent-dark);
  }
  .source-badge--saved { background: var(--color-bg-secondary); color: var(--color-text-secondary); }
  .source-badge--empty { background: transparent; color: var(--color-text-secondary); }

  .still-needed {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .still-needed__item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 4px;
    background: var(--color-bg-secondary);
    border-radius: 10px;
  }
  .still-needed__value { font-size: 14px; font-weight: var(--weight-medium); }
  .still-needed__label { font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.04em; text-transform: uppercase; }

  .suggestion-card {
    padding: 14px;
    background: var(--color-bg-secondary);
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .suggestion-card:last-child { margin-bottom: 0; }
  .suggestion-card__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .suggestion-card__name { font-size: 13px; font-weight: var(--weight-medium); }
  .suggestion-card__badge {
    font-size: 10px;
    padding: 3px 7px;
    background: var(--color-accent-light);
    color: var(--color-accent-dark);
    border-radius: 999px;
    font-weight: var(--weight-medium);
    letter-spacing: 0.02em;
  }
  .suggestion-card__badge--warn { background: var(--color-warn-light); color: var(--color-warn); }
  .suggestion-card__impact {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .impact-pill {
    font-size: 10px;
    padding: 3px 8px;
    background: var(--color-bg-primary);

  .top-strip__value { font-size: 13px; font-weight: var(--weight-medium); }
  .top-strip__btn {

  .flag-card__head { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: var(--weight-medium); text-transform: uppercase; letter-spacing: 0.07em; }
  .flag-card--high .flag-card__head { color: var(--color-danger); }
  .flag-card--low .flag-card__head { color: var(--color-warn); }
  .flag-card--borderline .flag-card__head { color: var(--color-borderline); }
  .flag-card__name { font-size: 13px; font-weight: var(--weight-medium); color: var(--color-text-primary); }
  .flag-card__value { font-size: 22px; font-weight: var(--weight-medium); color: var(--color-text-primary); letter-spacing: -0.01em; }
  .flag-card__value-unit { font-size: 11px; font-weight: var(--weight-regular); color: var(--color-text-secondary); margin-left: 2px; }
  .flag-card__range { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }
  .flag-card__bar { height: 3px; background: rgba(0,0,0,0.06); border-radius: 999px; overflow: hidden; }
  .flag-card__bar-fill { height: 100%; border-radius: 999px; }
  .flag-card--high .flag-card__bar-fill { background: var(--color-danger); }
  .flag-card--low .flag-card__bar-fill { background: var(--color-warn); }
  .flag-card--borderline .flag-card__bar-fill { background: var(--color-borderline); }
  .flag-card__left { display: flex; flex-direction: column; gap: 3px; }
  .flag-card__right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }

  /* Normal markers — category grouping */
  .marker-category + .marker-category { margin-top: 20px; }
  .marker-category__label {
    font-size: var(--font-size-sublabel);
    color: var(--color-text-secondary);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: var(--weight-medium);
  }
  .normal-marker {
    display: grid;
    grid-template-columns: 14px 1fr 60px auto;
    gap: 10px;
    align-items: center;
    padding: 9px 0;
  }
  .normal-marker + .normal-marker { border-top: var(--space-divider) solid var(--color-border-tertiary); }
  .normal-marker__name { font-size: 13px; }
  .normal-marker__bar { height: 3px; background: var(--color-border-tertiary); border-radius: 999px; overflow: hidden; position: relative; }
  .normal-marker__bar-dot {
    position: absolute;
    top: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;

  }
  .normal-marker__value { font-size: 12px; font-weight: var(--weight-medium); text-align: right; white-space: nowrap; }

  /* ----- Lab: InBody tab ----- */
  .inbody-stat {
    display: grid;
    grid-template-columns: 1fr auto 60px;
    gap: 12px;
    align-items: center;
    padding: 11px 0;

  .inbody-stat + .inbody-stat { border-top: var(--space-divider) solid var(--color-border-tertiary); }
  .inbody-stat__label { font-size: 13px; color: var(--color-text-secondary); }

  .inbody-stat__value-unit { font-size: 11px; font-weight: var(--weight-regular); color: var(--color-text-secondary); margin-left: 2px; }
  .inbody-stat__bar { height: 3px; background: var(--color-border-tertiary); border-radius: 999px; overflow: hidden; }
  .inbody-stat__bar-fill { height: 100%; background: var(--color-accent); border-radius: 999px; }

  .segmental-wrapper {

  .segmental-legend {

  /* InBody score card */

  .score-card__value { font-size: 32px; font-weight: var(--weight-medium); color: var(--color-accent-dark); line-height: 1; }

  /* ----- Lab: Trends tab ----- */
  .trends-dropdown {

  .trends-dropdown-option__info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .trends-dropdown-option__name { font-size: 13px; font-weight: var(--weight-medium); }
  .trends-dropdown-option__value { font-size: var(--font-size-sublabel); color: var(--color-text-secondary); }
  .trends-dropdown-option__badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: var(--weight-medium);

  .trends-dropdown-option__badge--high { background: var(--color-danger-light); color: var(--color-danger); }
  .trends-dropdown-option__badge--low { background: var(--color-warn-light); color: var(--color-warn); }
  .trends-dropdown-option__badge--borderline { background: var(--color-borderline-light); color: var(--color-borderline); }
  .trends-dropdown-option__badge--normal { background: var(--color-accent-light); color: var(--color-accent-dark); }

  .trend-chart-svg {
    width: 100%;

  .trend-table {
    margin-top: 16px;

  .trend-table__head {
    color: var(--color-text-secondary);

  .trend-table__cell--value { font-weight: var(--weight-medium); }

  .ai-observation {

  /* ----- Profile ----- */

  .plan-badge {

  .accent-picker {

  .profile-row {

  .booking-strip {

  .booking-strip__info { display: flex; flex-direction: column; gap: 2px; }
  .booking-strip__label { font-size: 10px; color: var(--color-accent-dark); text-transform: uppercase; letter-spacing: 0.07em; font-weight: var(--weight-medium); }
  .booking-strip__value { font-size: 13px; color: var(--color-accent-dark); font-weight: var(--weight-medium); }

  .signout-row {

  .usage-bar__label { font-size: 12px; color: var(--color-text-secondary); }

  .annual-nudge {

  .plan-card {

function macroArcSvg({ color, percent, valueText }) {
  const size = 58;

  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(percent, 100) / 100);
  return `
    <svg class="macro-arc__svg" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}"
              stroke="var(--color-macro-track)" stroke-width="${stroke}" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}"
              stroke="${color}" stroke-width="${stroke}" fill="none"
              stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"

      <text x="${size/2}" y="${size/2 + 4}" text-anchor="middle"

/* Trend line chart — 3 data points, grid lines, labelled points, month x-axis */
function trendChartSvg(marker) {
  const W = 340, H = 180;
  const padLeft = 30, padRight = 16, padTop = 20, padBottom = 30;
  const innerW = W - padLeft - padRight;
  const innerH = H - padTop - padBottom;

  const values = marker.points.map(p => p.value);
  let minV = Math.min(...values, marker.range[0]);
  let maxV = Math.max(...values, marker.range[1] || Math.max(...values) * 1.1);
  const padV = (maxV - minV) * 0.15;
  minV -= padV; maxV += padV;

  const xFor = (i) => padLeft + (innerW * i) / (marker.points.length - 1);
  const yFor = (v) => padTop + innerH - ((v - minV) / (maxV - minV)) * innerH;

  // reference range band (if meaningful)
  const band = marker.range[0] > minV && marker.range[1] < maxV ? `
    <rect x="${padLeft}" y="${yFor(marker.range[1])}" width="${innerW}"
          height="${yFor(marker.range[0]) - yFor(marker.range[1])}"
          fill="var(--color-accent)" opacity="0.06"/>` : '';

  // grid lines
  const gridLines = [0.25, 0.5, 0.75].map(p => {
    const y = padTop + innerH * p;
    return `<line x1="${padLeft}" y1="${y}" x2="${W - padRight}" y2="${y}"
                  stroke="var(--color-border-tertiary)" stroke-width="0.5"/>`;
  }).join('');

  // line path
  const pathD = marker.points.map((p, i) =>
    `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(p.value)}`).join(' ');

  const statusColour = marker.status === 'high' ? 'var(--color-danger)'
                     : marker.status === 'low' ? 'var(--color-warn)'
                     : marker.status === 'borderline' ? 'var(--color-borderline)'
                     : 'var(--color-accent)';

  // points + labels
  const points = marker.points.map((p, i) => `
    <circle cx="${xFor(i)}" cy="${yFor(p.value)}" r="5" fill="${statusColour}"/>
    <circle cx="${xFor(i)}" cy="${yFor(p.value)}" r="2.5" fill="#fff"/>
    <text x="${xFor(i)}" y="${yFor(p.value) - 12}" text-anchor="middle"
          font-size="11" font-weight="500" fill="var(--color-text-primary)">${p.value}</text>
    <text x="${xFor(i)}" y="${H - 10}" text-anchor="middle"
          font-size="10" fill="var(--color-text-secondary)">${p.date}</text>
  `).join('');

  return `
    <svg class="trend-chart-svg" viewBox="0 0 ${W} ${H}">
      ${band}
      ${gridLines}
      <path d="${pathD}" fill="none" stroke="${statusColour}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${points}
    </svg>`;
}

function renderTrendsTab() {
  const marker = DATA.trends[state.trendMarker];
  const statusLabel = {
    high: 'HIGH', low: 'LOW', borderline: 'BORDERLINE', normal: 'NORMAL', ontrack: 'ON TRACK',
  }[marker.status];

  // Compute table rows (with change vs previous)
  const tableRows = marker.points.map((p, i) => {
    if (i === 0) return { ...p, change: '—', changeClass: 'neutral' };
    const prev = marker.points[i - 1].value;
    const diff = p.value - prev;
    // Determine whether a positive or negative change is good, based on marker status
    const isLowerBetter = marker.status === 'high' || marker.status === 'borderline';
    const isHigherBetter = marker.status === 'low';
    const sign = diff > 0 ? '+' : '';
    let cls = 'neutral';
    if (diff !== 0) {
      if (isLowerBetter) cls = diff < 0 ? 'up' : 'down';
      else if (isHigherBetter) cls = diff > 0 ? 'up' : 'down';
      else cls = diff > 0 ? 'down' : 'up';
    }
    return { ...p, change: `${sign}${diff.toFixed(1)}`, changeClass: cls };
  });

  return `
    <section class="section" style="position: relative;">
      <div class="trends-dropdown" data-trends-dropdown>
        <div class="trends-dropdown__left">
          <span class="status-dot status-dot--${marker.status === 'ontrack' ? 'normal' : marker.status}"></span>
          <div class="trends-dropdown__info">
            <div class="trends-dropdown__name">${marker.name}</div>

function renderTrendsDropdownPanel() {
  const flagged = ['cortisol', 'ferritin', 'ldl'];
  const bodyComp = ['bodyFat'];
  const normal = ['vitaminD'];

  const opt = (key, disabled = false) => {
    const m = DATA.trends[key];
    if (!m) {
      // Disabled / placeholder option
      return `<div class="trends-dropdown-option trends-dropdown-option--disabled">
        <span class="status-dot status-dot--normal"></span>
        <div class="trends-dropdown-option__info">
          <div class="trends-dropdown-option__name">${key}</div>
          <div class="trends-dropdown-option__value">— —</div>
        </div>
      </div>`;
    }
    const statusLabel = { high: 'HIGH', low: 'LOW', borderline: 'BORDERLINE', normal: 'NORMAL', ontrack: 'ON TRACK' }[m.status];
    const statusKey = m.status === 'ontrack' ? 'ontrack' : m.status;
    return `
      <div class="trends-dropdown-option" data-trend-select="${key}">
        <span class="status-dot status-dot--${m.status === 'ontrack' ? 'normal' : m.status}"></span>
        <div class="trends-dropdown-option__info">
          <div class="trends-dropdown-option__name">${m.name}</div>
          <div class="trends-dropdown-option__value">${m.points[m.points.length-1].value} ${m.unit}</div>
        </div>
        <div class="trends-dropdown-option__badge trends-dropdown-option__badge--${statusKey}">${statusLabel}</div>
      </div>`;
  };

  return `
    <div class="trends-dropdown-panel trends-dropdown-panel--open">
      <div class="trends-dropdown-group trends-dropdown-group--warn">
        <div class="trends-dropdown-group__label">⚠ Needs attention</div>
        ${flagged.map(k => opt(k)).join('')}
      </div>
      <div class="trends-dropdown-group">
        <div class="trends-dropdown-group__label">Body composition</div>
        ${bodyComp.map(k => opt(k)).join('')}
      </div>
      <div class="trends-dropdown-group">
        <div class="trends-dropdown-group__label">Normal blood markers</div>
        ${normal.map(k => opt(k)).join('')}
      </div>
    </div>`;
}

/* ----- 7.6 Main render + routing ----- */
function render() {
  const content = document.getElementById('appContent');
  const nav = document.getElementById('bottomNav');

  const s = state.currentScreen;
  let screenMarkup = '';

  if (s === 'home') screenMarkup = renderHome();
  else if (s === 'nutrition') screenMarkup = renderNutrition();
  else if (s === 'lab') screenMarkup = renderLab();
  else if (s === 'profile') screenMarkup = renderProfile();
  else if (s === 'billing') screenMarkup = renderBilling();
  else if (s === 'plans') screenMarkup = renderPlans();
  else if (s === 'progress') screenMarkup = renderProgress();
  else if (s === 'stub-photos') screenMarkup = renderStub('stub-photos', 'Progress photos', 'This screen is stubbed pending a dedicated design session. The final design will cover upload cadence, compare views, and privacy controls.');
  else if (s === 'stub-food') screenMarkup = renderStub('stub-food', 'Food library', 'This screen is stubbed pending a dedicated design session. Open questions: saved meals vs. Kuwait food database, search, custom recipes.');
  else if (s === 'stub-blood-history') screenMarkup = renderStub('stub-blood-history', 'Blood test history', 'This is also the upload entry point for blood tests. User can photograph a printed report or pick a digital PDF. After parsing, a mandatory confirmation screen shows extracted values in editable fields. Needs design for: upload flow, parsing progress, confirmation screen, history archive, and per-draw summary views.');
  else if (s === 'stub-inbody-history') screenMarkup = renderStub('stub-inbody-history', 'InBody scan history', 'This is also the upload entry point for InBody scans (separate from blood tests). Same flow: camera or file picker, parsing, mandatory confirmation with editable fields. Needs design for: upload flow, scan timeline, and scan-to-scan comparison view.');
  else if (s === 'stub-personal') screenMarkup = renderStub('stub-personal', 'Personal details', 'This screen is stubbed pending a dedicated design session. Needs design for editable profile fields and medical disclosures.');
  else if (s === 'stub-notifications') screenMarkup = renderStub('stub-notifications', 'Notifications', 'This screen is stubbed pending a dedicated design session. Needs product decisions on notification categories and per-category toggles.');
  else if (s === 'stub-devices') screenMarkup = renderStub('stub-devices', 'Connected devices', 'This screen is stubbed pending a dedicated design session. Needs decisions on supported integrations (Apple Health, Google Fit, Oura, Garmin, etc.).');

  content.innerHTML = screenMarkup;
  nav.innerHTML = renderBottomNav();
  nav.style.display = renderBottomNav() ? 'flex' : 'none';

  // Scroll to top on screen change
  content.scrollTop = 0;
}

/* ----- 7.7 Event delegation ----- */
// One listener on app root handles every interaction. Keeps the code audit-friendly
// and means adding a new navigable element is just adding a data-attribute.
document.getElementById('app').addEventListener('click', (e) => {
  const target = e.target.closest('[data-nav], [data-subtab-switch], [data-labtab-switch], [data-trends-dropdown], [data-trend-select], [data-cycle], [data-water-add], [data-billing-view-toggle]');
  if (!target) {
    // Click outside of dropdown closes it
    if (state.trendsDropdownOpen && !e.target.closest('.trends-dropdown-panel')) {
      state.trendsDropdownOpen = false;
      render();
    }
    return;
  }

  // Top-level / sub-page navigation
  if (target.dataset.nav) {
    state.currentScreen = target.dataset.nav;
    if (target.dataset.subtab) state.nutritionTab = target.dataset.subtab;
    state.trendsDropdownOpen = false;
    render();
    return;
  }

  // Nutrition sub-tab switch (chat / log)
  if (target.dataset.subtabSwitch) {
    state.nutritionTab = target.dataset.subtabSwitch;
    render();
    return;
  }

  // Lab sub-tab switch (blood / inbody / trends)
  if (target.dataset.labtabSwitch) {
    state.labTab = target.dataset.labtabSwitch;
    state.trendsDropdownOpen = false;
    render();
    return;
  }

  // Trends dropdown open/close
  if (target.dataset.trendsDropdown !== undefined) {
    state.trendsDropdownOpen = !state.trendsDropdownOpen;
    render();
    return;
  }

  // Trends marker selection
  if (target.dataset.trendSelect) {
    state.trendMarker = target.dataset.trendSelect;
    state.trendsDropdownOpen = false;
    render();
    return;
  }

  // Plans monthly/annual toggle
  if (target.dataset.cycle) {
    state.billingCycle = target.dataset.cycle;
    render();
    return;
  }

  // Water quick-add — local DOM update only (avoids re-render flicker of the bottle animation)
  if (target.dataset.waterAdd) {
    const add = parseInt(target.dataset.waterAdd, 10);
    state.waterMl = Math.min(state.waterMl + add, DATA.targets.water + 500);
    const mount = document.getElementById('waterBottleMount');
    if (mount) mount.innerHTML = waterBottleSvg(state.waterMl, DATA.targets.water);
    const val = document.getElementById('waterValue');
    if (val) val.textContent = (state.waterMl / 1000).toFixed(1) + 'L';
    const rem = document.getElementById('waterRemain');
    if (rem) rem.textContent = Math.max(0, DATA.targets.water - state.waterMl) + 'ml';
    return;
  }

  // Dev-only billing view toggle
  if (target.dataset.billingViewToggle !== undefined) {
    state.billingView = state.billingView === 'premium' ? 'core' : 'premium';
    render();
    return;
  }
});

// Initial render
render();
</script>
</body>
</html>
